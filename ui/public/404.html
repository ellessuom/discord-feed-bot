<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Discord Feed Bot</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects 404s back to index so the client-side router can handle them
      var pathSegmentsToKeep = 1; // keep /discord-feed-bot/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
      );
    </script>
  </head>
  <body></body>
</html>
